# AUTO ENGINE Browser — Self-contained build & sign workflow
# Fetches full Chromium source, overlays AUTO ENGINE patches,
# compiles arm64, signs with a generated key, and publishes to Releases.
#
# ⚠️  A full Chromium build needs ~80 GB disk and ~6 h of CPU.
#     Standard GitHub-hosted runners (~14 GB SSD) will run out of disk
#     during the Chromium fetch step.  Use a self-hosted runner with
#     ≥100 GB free disk, or enable "larger runners" in your repository.

name: "AUTO ENGINE: Build & Sign APK"

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target CPU architecture"
        required: true
        default: "arm64"
        type: choice
        options:
          - arm64
          - arm
          - x64
          - x86

jobs:
  build:
    runs-on: ubuntu-latest   # swap for self-hosted if available

    env:
      TARGET_CPU: ${{ github.event.inputs.platform || 'arm64' }}
      CHROMIUM_DIR: /mnt/chromium

    steps:
      # ── Disk preparation ────────────────────────────────────────────────
      - name: Free up disk space
        run: |
          sudo swapoff -av
          sudo rm -rf /swapfile \
                      /usr/share/dotnet \
                      /usr/local/lib/android \
                      /opt/ghc \
                      /usr/share/swift
          df -h

      - name: Create Chromium working directory on /mnt (SSD)
        run: |
          sudo mkdir -p /mnt/chromium
          sudo chown $USER:$USER /mnt/chromium

      # ── Checkout AUTO ENGINE overlay ─────────────────────────────────────
      - name: Checkout AUTO ENGINE source overlay
        uses: actions/checkout@v4
        with:
          path: auto-engine-overlay

      # ── Toolchain ────────────────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3 python3-pip python-is-python3 \
            curl git lsb-release \
            openjdk-11-jdk-headless \
            ccache jq rsync

      - name: Install depot_tools
        run: |
          git clone --depth 1 \
            https://chromium.googlesource.com/chromium/tools/depot_tools.git \
            /mnt/chromium/depot_tools
          echo "/mnt/chromium/depot_tools" >> $GITHUB_PATH

      # ── Fetch Chromium source ────────────────────────────────────────────
      - name: Read Chromium revision from overlay
        id: chromium_ver
        run: |
          source auto-engine-overlay/CHROMIUM_VERSION
          REF="${CHROMIUM_MAJOR}.${CHROMIUM_MINOR}.${CHROMIUM_BUILD}.${CHROMIUM_PATCH}"
          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "Chromium revision: $REF"

      - name: Configure gclient (run from /mnt/chromium)
        working-directory: /mnt/chromium
        run: |
          # gclient config must be run in the directory that will CONTAIN src/
          gclient config --name src \
            "https://chromium.googlesource.com/chromium/src.git"
          # target_os="android" is required so the Android native toolchain
          # (NDK etc.) is fetched and gn gen succeeds.
          # --custom-var cannot take list values, so we append directly.
          echo 'target_os = ["android"]' >> /mnt/chromium/.gclient
          # Verify
          cat /mnt/chromium/.gclient

      - name: Fetch Chromium source — no history, pinned revision
        working-directory: /mnt/chromium
        run: |
          export DEPOT_TOOLS_UPDATE=0
          gclient sync \
            --nohooks \
            --no-history \
            --revision="src@${{ steps.chromium_ver.outputs.ref }}" \
            -D
        timeout-minutes: 240

      - name: Run Chromium hooks (installs NDK, SDK, etc.)
        working-directory: /mnt/chromium
        continue-on-error: true   # traffic_annotation_auditor hook fails on stale GCS URL; it is not needed for APK builds
        run: |
          export DEPOT_TOOLS_UPDATE=0
          gclient runhooks
        timeout-minutes: 60

      # ── Overlay AUTO ENGINE patches ──────────────────────────────────────
      - name: Overlay AUTO ENGINE source on top of Chromium
        run: |
          rsync -av --exclude='.git' \
            auto-engine-overlay/ \
            /mnt/chromium/src/
          echo "Overlay applied."

      # ── Keystore ─────────────────────────────────────────────────────────
      - name: Generate keystore for APK signing
        working-directory: /mnt/chromium/src
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias dev \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass public_password \
            -keypass  public_password \
            -dname "cn=AUTO ENGINE, ou=Actions, o=AUTO ENGINE Browser, c=GitHub"

      # ── GN args ──────────────────────────────────────────────────────────
      - name: Write GN args
        run: |
          OUT=/mnt/chromium/src/out/android_${{ env.TARGET_CPU }}
          mkdir -p "$OUT"
          sed "s/target_cpu = \"arm64\"/target_cpu = \"${{ env.TARGET_CPU }}\"/" \
            /mnt/chromium/src/.build/production_build_reference/args.gn \
            > "$OUT/args.gn"
          cat "$OUT/args.gn"

      - name: Generate build files (gn gen)
        working-directory: /mnt/chromium/src
        run: gn gen out/android_${{ env.TARGET_CPU }}

      # ── Compile ──────────────────────────────────────────────────────────
      - name: Configure ccache
        run: |
          ccache --max-size=10G
          ccache --zero-stats

      - name: Build ChromePublic.apk
        working-directory: /mnt/chromium/src
        run: |
          autoninja -C out/android_${{ env.TARGET_CPU }} chrome_public_apk
        timeout-minutes: 360

      # ── Sign ─────────────────────────────────────────────────────────────
      - name: Align and sign APK
        working-directory: /mnt/chromium/src
        run: |
          APK_IN="out/android_${{ env.TARGET_CPU }}/apks/ChromePublic.apk"
          ALIGNED="${APK_IN%.apk}-aligned.apk"
          APK_OUT="out/android_${{ env.TARGET_CPU }}/apks/AUTO_ENGINE_${{ env.TARGET_CPU }}_${{ github.run_id }}.apk"

          zipalign -v -p 4 "$APK_IN" "$ALIGNED"
          apksigner sign \
            --ks keystore.jks \
            --ks-key-alias dev \
            --ks-pass pass:public_password \
            --key-pass pass:public_password \
            --out "$APK_OUT" \
            "$ALIGNED"

          ls -lh "$APK_OUT"
          echo "SIGNED_APK=$APK_OUT" >> $GITHUB_ENV

      # ── Upload artifact ──────────────────────────────────────────────────
      - name: Upload signed APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AUTO_ENGINE_${{ env.TARGET_CPU }}_apk
          path: /mnt/chromium/src/${{ env.SIGNED_APK }}

      # ── GitHub Release ───────────────────────────────────────────────────
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name:     "build-${{ github.run_id }}"
          release_name: "AUTO ENGINE v${{ github.run_id }} (${{ env.TARGET_CPU }})"
          draft:        false
          prerelease:   true
          body: |
            **AUTO ENGINE Browser** — automated build

            | Field | Value |
            |---|---|
            | Architecture | **${{ env.TARGET_CPU }}** |
            | Chromium base | ${{ steps.chromium_ver.outputs.ref }} |
            | Run ID | ${{ github.run_id }} |
            | Triggered by | ${{ github.actor }} |

            > ⚠️ Signed with a one-time GitHub Actions key.

      - name: Upload APK to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url:         ${{ steps.create_release.outputs.upload_url }}
          asset_path:         /mnt/chromium/src/${{ env.SIGNED_APK }}
          asset_name:         AUTO_ENGINE_${{ env.TARGET_CPU }}_${{ github.run_id }}.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Print release link
        run: |
          echo "Release: https://github.com/${{ github.repository }}/releases/tag/build-${{ github.run_id }}"
